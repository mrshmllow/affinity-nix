name: autofix.ci
on:
  pull_request:
  push:
    branches: ["main"]
permissions:
  contents: read
jobs:
  autofix:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            trusted-public-keys = cache.garnix.io:CTFPyKSLcx5RMJKfLo5EEPUObbA78b0YQ2DTCJXqr9g= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
            substituters = https://cache.garnix.io https://cache.nixos.org
      - name: Restore uv cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: /tmp/.uv-cache
          key: uv-${{ runner.os }}-${{ hashFiles('tests/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ hashFiles('tests/uv.lock') }}
            uv-${{ runner.os }}
      - name: nix fmt
        run: nix develop --print-build-logs -v --command pre-commit run --all-files
        continue-on-error: true
      - name: Minimize uv cache
        run: nix develop --print-build-logs -v --command uv cache prune --ci
      - uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a
